<script>
const LAT = -20.1, LON = -48.9;

function getMoonPhase(date) {
  const known = new Date(2000,0,6,18,14);
  const days = (date - known)/(1000*60*60*24);
  const cycle = 29.53058867;
  let phase = ((days % cycle)+cycle)%cycle;
  let name,emoji,pescaEfeito,iluminacao;
  if(phase<1.85){name='Lua Nova';emoji='🌑';pescaEfeito='Excelente';iluminacao=0;}
  else if(phase<7.38){name='Crescente';emoji='🌒';pescaEfeito='Muito Bom';iluminacao=Math.round((phase/7.38)*40);}
  else if(phase<9.22){name='Quarto Crescente';emoji='🌓';pescaEfeito='Bom';iluminacao=50;}
  else if(phase<14.77){name='Gibosa Crescente';emoji='🌔';pescaEfeito='Regular';iluminacao=Math.round(50+(phase-9.22)/5.55*40);}
  else if(phase<16.61){name='Lua Cheia';emoji='🌕';pescaEfeito='Ruim';iluminacao=100;}
  else if(phase<22.15){name='Gibosa Minguante';emoji='🌖';pescaEfeito='Regular';iluminacao=Math.round(90-(phase-16.61)/5.54*40);}
  else if(phase<24.0){name='Quarto Minguante';emoji='🌗';pescaEfeito='Bom';iluminacao=50;}
  else{name='Minguante';emoji='🌘';pescaEfeito='Muito Bom';iluminacao=Math.round(40-(phase-24)/5.53*40);}
  return{name,emoji,pescaEfeito,iluminacao,phase};
}

function getMoonDesc(nome) {
  const d={'Lua Nova':'Céu escuro favorece camuflagem do mergulhador. Peixes ficam mais ativos e menos assustados. Melhor período para pesca subaquática!','Crescente':'Luminosidade baixa e crescente. Período excelente — peixes ainda ativos e ambiente propício ao mergulho.','Quarto Crescente':'Iluminação moderada. Bom período, especialmente nas primeiras horas do dia.','Gibosa Crescente':'Luminosidade aumentando. Peixes começam a ficar mais cautelosos. Prefira horários crepusculares.','Lua Cheia':'Água iluminada reduz efetividade da pesca subaquática. Peixes muito alertas. Evite este período.','Gibosa Minguante':'Luminosidade diminuindo. Condições melhorando gradualmente. Tente nas margens sombreadas.','Quarto Minguante':'Boas condições retornando. Peixes readquirindo rotina de alimentação normal.','Minguante':'Escuridão crescente. Excelente período! Peixes menos alertas e mais fáceis de aproximar.'};
  return d[nome]||'';
}

async function fetchWeather() {
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,weathercode&current_weather=true&timezone=America/Sao_Paulo&forecast_days=7`;
  const r=await fetch(url);
  if(!r.ok)throw new Error('Erro clima');
  return r.json();
}

function wxCodeToInfo(code) {
  if(code===0)return{label:'Sol pleno',icon:'☀️',class:'excelente'};
  if(code<=2)return{label:'Parcialmente nublado',icon:'⛅',class:'bom'};
  if(code<=3)return{label:'Nublado',icon:'☁️',class:'regular'};
  if(code<=49)return{label:'Neblina/Névoa',icon:'🌫️',class:'regular'};
  if(code<=59)return{label:'Garoa',icon:'🌦️',class:'regular'};
  if(code<=69)return{label:'Chuva',icon:'🌧️',class:'ruim'};
  if(code<=79)return{label:'Granizo',icon:'🌨️',class:'ruim'};
  if(code<=82)return{label:'Pancadas de chuva',icon:'⛈️',class:'ruim'};
  if(code<=99)return{label:'Tempestade',icon:'⛈️',class:'ruim'};
  return{label:'Variável',icon:'🌥️',class:'regular'};
}

function calcScore(wxCode,precip,wind,moon) {
  let score=100,fatores=[];
  if(moon.pescaEfeito==='Excelente'){score+=20;fatores.push('🌑 Lua favorável (+20)');}
  else if(moon.pescaEfeito==='Muito Bom'){score+=10;fatores.push('🌒 Lua boa (+10)');}
  else if(moon.pescaEfeito==='Regular'){score-=15;fatores.push('🌔 Lua desfavorável (-15)');}
  else if(moon.pescaEfeito==='Ruim'){score-=35;fatores.push('🌕 Lua cheia (-35)');}
  if(wxCode===0){score+=15;fatores.push('☀️ Sol pleno (+15)');}
  else if(wxCode<=2){score+=8;fatores.push('⛅ Pouco nublado (+8)');}
  else if(wxCode>=60){score-=20;fatores.push('🌧️ Chuva (-20)');}
  else if(wxCode>=80){score-=30;fatores.push('⛈️ Tempestade (-30)');}
  if(precip>10){score-=15;fatores.push(`🌧️ Precipitação alta: ${Math.round(precip)}mm (-15)`);}
  else if(precip>2){score-=5;fatores.push(`🌦️ Alguma chuva: ${Math.round(precip)}mm (-5)`);}
  if(wind>30){score-=20;fatores.push(`💨 Vento forte: ${Math.round(wind)}km/h (-20)`);}
  else if(wind>15){score-=8;fatores.push(`💨 Vento moderado: ${Math.round(wind)}km/h (-8)`);}
  else{score+=5;fatores.push(`🌿 Vento calmo: ${Math.round(wind)}km/h (+5)`);}
  score=Math.max(0,Math.min(150,score));
  let classe,label;
  if(score>=110){classe='excelente';label='🏆 Excelente';}
  else if(score>=80){classe='bom';label='👍 Bom';}
  else if(score>=55){classe='regular';label='⚠️ Regular';}
  else{classe='ruim';label='❌ Evitar';}
  return{score:Math.min(score,140),classe,label,fatores};
}

const PEIXES=[
  {emoji:'🐟',nome:'Dourado',habitat:'Corredeiras',ativo_sol:true,ativo_sombra:false,dica:'Prefere águas rápidas e oxigenadas'},
  {emoji:'🐠',nome:'Pacu',habitat:'Remansos',ativo_sol:false,ativo_sombra:true,dica:'Ativo ao entardecer, remansos com folhas'},
  {emoji:'🦈',nome:'Pintado/Surubim',habitat:'Fundo/Troncos',ativo_sol:false,ativo_sombra:true,dica:'Embaixo de troncos submersos, à noite'},
  {emoji:'🐡',nome:'Curimbatá',habitat:'Corredeiras rasas',ativo_sol:true,ativo_sombra:true,dica:'Fácil de encontrar, se alimenta de algas'},
  {emoji:'🦑',nome:'Piapara',habitat:'Pedras',ativo_sol:true,ativo_sombra:false,dica:'Junto às pedras em corredeiras'},
  {emoji:'🐬',nome:'Piraputanga',habitat:'Superfície',ativo_sol:true,ativo_sombra:false,dica:'Próxima à superfície, áreas sombreadas'},
];

let selectedDay=0,weatherData=null;

function renderApp(data) {
  weatherData=data;
  const today=new Date();
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(today);
    d.setDate(today.getDate()+i);
    const moon=getMoonPhase(d);
    const wx=data.daily;
    const wxInfo=wxCodeToInfo(wx.weathercode[i]);
    const sc=calcScore(wx.weathercode[i],wx.precipitation_sum[i],wx.windspeed_10m_max[i],moon);
    days.push({date:d,moon,wxInfo,tmax:Math.round(wx.temperature_2m_max[i]),tmin:Math.round(wx.temperature_2m_min[i]),precip:Math.round(wx.precipitation_sum[i]),wind:Math.round(wx.windspeed_10m_max[i]),wxCode:wx.weathercode[i],score:sc});
  }
  window._days=days;
  const dayNames=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const monthNames=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  let daysHtml='';
  days.forEach((d,i)=>{
    const isToday=i===0;
    daysHtml+=`<div class="day-card ${d.score.classe} ${i===selectedDay?'selected':''}" onclick="selectDay(${i})" role="button" tabindex="0">
      <div class="day-name">${isToday?'Hoje':dayNames[d.date.getDay()]}</div>
      <div class="day-num">${d.date.getDate()}<span style="font-size:10px;font-weight:400"> ${monthNames[d.date.getMonth()]}</span></div>
      <div class="day-icon">${d.wxInfo.icon}</div>
      <div class="day-temp">${d.tmax}°/${d.tmin}°</div>
      <div class="day-moon">${d.moon.emoji}</div>
      <div class="day-score-dot dot-${d.score.classe}"></div>
    </div>`;
  });

  const sel=days[selectedDay];
  const scoreWidth=Math.round((sel.score.score/140)*100);
  let scoreColor=sel.score.classe==='excelente'?'#27ae60':sel.score.classe==='bom'?'#2980b9':sel.score.classe==='regular'?'#f39c12':'#e74c3c';
  const moonInfo=getMoonDesc(sel.moon.name);

  const fishHtml=PEIXES.map(f=>{
    let status,statusClass;
    const isSunny=sel.wxCode<=2;
    if(f.ativo_sol&&isSunny){status='Ativo Agora';statusClass='active-sim';}
    else if(f.ativo_sombra&&!isSunny){status='Ativo Agora';statusClass='active-sim';}
    else{status='Pouco Ativo';statusClass='active-maybe';}
    if(sel.score.classe==='ruim'){status='Difícil Hoje';statusClass='active-nao';}
    return `<div class="fish-card"><div class="fish-emoji">${f.emoji}</div><div class="fish-name">${f.nome}</div><div class="fish-info">${f.habitat}</div><div class="fish-active ${statusClass}">${status}</div><div style="font-size:10px;color:var(--color-text-secondary);margin-top:4px;">${f.dica}</div></div>`;
  }).join('');

  let tips=[];
  if(sel.score.classe==='excelente'){tips=[{icon:'ti-clock',txt:'Horário ideal: entre 6h–9h e 16h–18h (entardecer).'},{icon:'ti-wave-square',txt:'Explore corredeiras e remansos — dourado e curimbatá muito ativos.'},{icon:'ti-eye',txt:'Visibilidade boa. Mergulhe devagar para não assustar os peixes.'},{icon:'ti-sun',txt:'Dia ideal! Clima e lua alinhados para pesca subaquática.'}];}
  else if(sel.score.classe==='bom'){tips=[{icon:'ti-clock',txt:'Prefira 6h–8h ou final da tarde (16h–18h).'},{icon:'ti-fish',txt:'Foque em zonas de transição: onde corredeira encontra remanso.'},{icon:'ti-droplet',txt:sel.precip>0?'Pode haver leve turbidez — tente áreas de água mais clara.':'Água limpa. Ótima visibilidade para mergulho.'}];}
  else if(sel.score.classe==='regular'){tips=[{icon:'ti-alert-triangle',txt:'Condições medianas. Tente nas melhores zonas do rio.'},{icon:'ti-moon',txt:sel.moon.iluminacao>70?'Lua iluminada — peixes mais alertas. Movimentos lentos.':'Aproxime-se devagar, os peixes estão mais cautelosos.'},{icon:'ti-map-pin',txt:'Explore locais com vegetação submersa e troncos.'}];}
  else{tips=[{icon:'ti-x',txt:'Hoje não é o melhor dia. Planeje a próxima saída.'},{icon:'ti-calendar',txt:`Próximos dias melhores: ${days.filter(d=>d.score.classe==='excelente'||d.score.classe==='bom').map(d=>d.date.getDate()+'/'+(d.date.getMonth()+1)).slice(0,3).join(', ')||'veja o calendário acima'}.`},{icon:'ti-tools',txt:'Aproveite para revisar equipamentos: roupa, arpão, cinto e nadadeiras.'}];}

  const tipsHtml=tips.map(t=>`<li><i class="ti ${t.icon}" aria-hidden="true"></i><span>${t.txt}</span></li>`).join('');
  const now=new Date();
  document.getElementById('last-update').textContent=`Atualizado ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

  document.getElementById('main-content').innerHTML=`
    <div class="section-title"><i class="ti ti-calendar-week" aria-hidden="true"></i>Próximos 7 dias</div>
    <div class="days-grid">${daysHtml}</div>
    <div class="section-title"><i class="ti ti-chart-bar" aria-hidden="true"></i>Condições — ${sel.date.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}</div>
    <div class="cards-grid">
      <div class="card temp"><div class="card-label">Temperatura</div><div class="card-value">${sel.tmax}°C</div><div class="card-sub">Mín ${sel.tmin}°C</div></div>
      <div class="card chuva"><div class="card-label">Precipitação</div><div class="card-value">${sel.precip}<span style="font-size:14px">mm</span></div><div class="card-sub">${sel.wxInfo.label}</div></div>
      <div class="card vento"><div class="card-label">Vento Máx.</div><div class="card-value">${sel.wind}<span style="font-size:14px">km/h</span></div><div class="card-sub">${sel.wind<=10?'Calmo':sel.wind<=20?'Leve':sel.wind<=30?'Moderado':'Forte'}</div></div>
      <div class="card lua"><div class="card-label">Lua</div><div class="card-value">${sel.moon.emoji}</div><div class="card-sub">${sel.moon.name}</div></div>
    </div>
    <div class="score-bar">
      <div class="score-header"><span class="score-label">Índice de Pesca Subaquática</span><span class="score-badge ${sel.score.classe}">${sel.score.label}</span></div>
      <div class="score-track"><div class="score-fill" style="width:${scoreWidth}%;background:${scoreColor};"></div></div>
      <div class="score-factors">${sel.score.fatores.join(' · ')}</div>
    </div>
    <div class="moon-phase-big">
      <div class="moon-symbol">${sel.moon.emoji}</div>
      <div><div class="moon-name">${sel.moon.name}</div><div class="moon-desc">${moonInfo}</div><div class="moon-effect">Para pesca subaquática: <strong>${sel.moon.pescaEfeito}</strong> · Iluminação: ~${sel.moon.iluminacao}%</div></div>
    </div>
    <div class="section-title"><i class="ti ti-fish" aria-hidden="true"></i>Peixes da Bacia do Paraná / Rio Grande</div>
    <div class="fish-grid">${fishHtml}</div>
    <div class="section-title"><i class="ti ti-bulb" aria-hidden="true"></i>Dicas para hoje</div>
    <div class="detail-panel"><ul class="tips-list">${tipsHtml}</ul></div>
  `;
}

function selectDay(i){selectedDay=i;if(weatherData)renderApp(weatherData);}

async function loadAll(){
  document.getElementById('main-content').innerHTML=`<div class="loading-msg"><i class="ti ti-loader" style="font-size:24px;display:block;margin-bottom:8px;"></i>Buscando dados de clima...</div>`;
  document.getElementById('last-update').textContent='Atualizando...';
  try{const data=await fetchWeather();selectedDay=0;renderApp(data);}
  catch(e){document.getElementById('main-content').innerHTML=`<div class="error-msg"><strong>Não foi possível buscar dados.</strong><br>Verifique sua conexão e tente novamente.<br><small>Erro: ${e.message}</small></div><button class="btn-refresh" onclick="loadAll()"><i class="ti ti-refresh"></i> Tentar novamente</button>`;}
}

loadAll();
</script>
