<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>Pesca Subaquática Inteligente</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;700;900&family=Roboto+Condensed:wght@300;400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>

:root{
  --bg:#07131f;
  --card:#0f1f2d;
  --card2:#14293d;
  --primary:#00b4ff;
  --primary2:#0ed39b;
  --text:#ffffff;
  --sub:#9fb5c8;
  --border:rgba(255,255,255,0.08);
  --success:#19c37d;
  --warning:#f7b731;
  --danger:#ff5d5d;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:
  radial-gradient(circle at top right,#10345a 0%,transparent 25%),
  radial-gradient(circle at bottom left,#0e7a65 0%,transparent 20%),
  var(--bg);

  color:var(--text);
  font-family:'Roboto Condensed',sans-serif;
  min-height:100vh;
  padding:20px;
}

.app{
  max-width:1200px;
  margin:auto;
}

.header{
  background:linear-gradient(135deg,#0a3d62,#11669b,#0e8a72);
  border-radius:24px;
  padding:24px;
  position:relative;
  overflow:hidden;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,0.08);
}

.header::before{
  content:'';
  position:absolute;
  width:220px;
  height:220px;
  border-radius:50%;
  background:rgba(255,255,255,0.05);
  top:-80px;
  right:-80px;
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.logo-area{
  display:flex;
  align-items:center;
  gap:18px;
}

.logo{
  width:75px;
  height:75px;
  border-radius:20px;
  background:rgba(255,255,255,0.15);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
}

.title{
  font-family:'Exo 2',sans-serif;
  font-size:34px;
  font-weight:900;
}

.subtitle{
  color:#dbefff;
  margin-top:4px;
  font-size:14px;
}

.location-box{
  background:rgba(255,255,255,0.12);
  padding:14px 18px;
  border-radius:14px;
  backdrop-filter:blur(10px);
  min-width:250px;
}

.location-title{
  font-size:12px;
  opacity:.8;
  margin-bottom:4px;
}

.location-name{
  font-size:20px;
  font-weight:700;
}

.location-coords{
  font-size:12px;
  opacity:.8;
  margin-top:3px;
}

.location-actions{
  margin-top:12px;
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:8px;
}

.city-input{
  width:100%;
  min-width:0;
  border:1px solid rgba(255,255,255,0.18);
  background:rgba(7,19,31,0.55);
  color:white;
  border-radius:10px;
  padding:10px 12px;
  font:inherit;
}

.city-input::placeholder{
  color:rgba(255,255,255,0.58);
}

.icon-btn{
  width:42px;
  height:42px;
  border:0;
  border-radius:10px;
  background:rgba(255,255,255,0.16);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:19px;
}

.icon-btn.primary{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
}

.location-hint{
  color:#dbefff;
  font-size:12px;
  margin-top:8px;
  opacity:.84;
}

.main-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
}

.section{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:22px;
  padding:22px;
}

.section-title{
  font-family:'Exo 2',sans-serif;
  font-size:18px;
  font-weight:700;
  margin-bottom:18px;
  display:flex;
  align-items:center;
  gap:10px;
}

.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:16px;
}

.card{
  background:linear-gradient(180deg,var(--card2),#102130);
  border-radius:18px;
  padding:20px;
  border:1px solid var(--border);
}

.card-label{
  color:var(--sub);
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.06em;
}

.card-value{
  font-family:'Exo 2',sans-serif;
  font-size:38px;
  font-weight:900;
  margin-top:8px;
}

.card-sub{
  color:var(--sub);
  margin-top:6px;
  font-size:13px;
}

.days-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:12px;
}

.day-card{
  background:linear-gradient(180deg,#12263a,#0d1b28);
  border-radius:18px;
  padding:16px;
  border:1px solid var(--border);
  cursor:pointer;
  transition:.25s;
  text-align:center;
}

.day-card:hover{
  transform:translateY(-5px);
}

.day-card.selected{
  border:2px solid var(--primary);
  box-shadow:0 0 20px rgba(0,180,255,.25);
}

.day-name{
  color:var(--sub);
  font-size:12px;
  margin-bottom:8px;
}

.day-temp{
  font-size:24px;
  font-weight:700;
  margin:8px 0;
}

.day-icon{
  font-size:36px;
}

.score-bar{
  margin-top:15px;
}

.track{
  width:100%;
  height:16px;
  border-radius:999px;
  background:#132637;
  overflow:hidden;
  margin-top:12px;
}

.fill{
  height:100%;
  border-radius:999px;
  transition:1s;
}

.fish-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
}

.fish-card{
  background:linear-gradient(180deg,#112334,#0d1d2b);
  border-radius:18px;
  padding:18px;
  border:1px solid var(--border);
}

.fish-emoji{
  font-size:42px;
}

.fish-name{
  font-size:20px;
  font-weight:700;
  margin-top:8px;
}

.fish-desc{
  color:var(--sub);
  margin-top:8px;
  font-size:13px;
  line-height:1.5;
}

.active{
  display:inline-block;
  margin-top:10px;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.good{
  background:rgba(25,195,125,.15);
  color:#33ffab;
}

.bad{
  background:rgba(255,93,93,.15);
  color:#ff7d7d;
}

.medium{
  background:rgba(247,183,49,.15);
  color:#ffd166;
}

.moon{
  display:flex;
  align-items:center;
  gap:20px;
  background:linear-gradient(135deg,#09111f,#132741);
  border-radius:20px;
  padding:24px;
  margin-top:20px;
}

.moon-emoji{
  font-size:72px;
}

.moon-title{
  font-size:28px;
  font-weight:900;
  font-family:'Exo 2',sans-serif;
}

.moon-desc{
  margin-top:8px;
  color:#d2e5f3;
  line-height:1.6;
}

.tips{
  list-style:none;
}

.tips li{
  display:flex;
  gap:12px;
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.tips li:last-child{
  border:none;
}

.footer{
  text-align:center;
  color:var(--sub);
  margin-top:24px;
  font-size:13px;
}

.btn{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;
  border:none;
  padding:14px 22px;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
  font-size:15px;
}

.loading{
  text-align:center;
  padding:50px;
}

.loading i{
  font-size:50px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

@media(max-width:700px){

  .title{
    font-size:26px;
  }

  .card-value{
    font-size:30px;
  }

  .moon{
    flex-direction:column;
    text-align:center;
  }

}

</style>
</head>

<body>

<div class="app">

<div class="header">

<div class="header-top">

<div class="logo-area">

<div class="logo">
🤿
</div>

<div>
<div class="title">
Pesca Subaquática Inteligente
</div>

<div class="subtitle" id="subtitle">
Sistema avançado com GPS e clima em tempo real
</div>
</div>

</div>

<div class="location-box">

<div class="location-title">
LOCALIZAÇÃO ATUAL
</div>

<div class="location-name" id="location-name">
Localizando...
</div>

<div class="location-coords" id="coords">
---
</div>

<div class="location-actions">
  <input class="city-input" id="city-input" placeholder="Ex: Itapagipe-MG" />
  <button class="icon-btn primary" onclick="searchCity()" title="Buscar cidade" aria-label="Buscar cidade">
    <i class="ti ti-search"></i>
  </button>
  <button class="icon-btn" onclick="loadAll()" title="Usar GPS" aria-label="Usar GPS">
    <i class="ti ti-current-location"></i>
  </button>
</div>

<div class="location-hint">
Digite a cidade ou use o GPS.
</div>

</div>

</div>

</div>

<div id="content">

<div class="loading">
<i class="ti ti-loader"></i>
<h2 style="margin-top:20px;">
Obtendo GPS e clima...
</h2>
</div>

</div>

<div class="footer">
Desenvolvido por Adolfo Queiroz · Sistema Inteligente de Pesca · GPS Real Time
</div>

</div>

<script>

let LAT = null;
let LON = null;
let CITY = 'Região Atual';
let selectedDay = 0;
let weatherData = null;

const PEIXES = [

{
emoji:'🐟',
nome:'Tilápia',
desc:'Espécie exótica/invasora comum na bacia do Paraná. Em geral é uma das espécies que a pesca busca controlar.',
sol:true
},

{
emoji:'🐠',
nome:'Tucunaré',
desc:'Predador introduzido fora de sua área natural em muitos reservatórios da bacia. Costuma ficar mais ativo com sol e água clara.',
sol:true
},

{
emoji:'🐡',
nome:'Pirarucu',
desc:'Espécie amazônica e não nativa da bacia do Paraná. Onde aparece como introduzida, exige atenção às regras locais.',
sol:false
},

{
emoji:'🐟',
nome:'Carpa',
desc:'Peixe exótico introduzido, encontrado em represas e ambientes mais lentos.',
sol:false
},

{
emoji:'🐠',
nome:'Bagre-africano',
desc:'Espécie invasora resistente, associada a ambientes alterados e de baixa oxigenação.',
sol:false
}

];

function normalizeText(value){

  return String(value || '')
  .normalize('NFD')
  .replace(/[\u0300-\u036f]/g,'')
  .toLowerCase()
  .trim();

}

function stateToUF(value){

  const text = String(value || '').trim();

  if(/^[A-Z]{2}$/.test(text)) return text;

  const iso = text.match(/BR-([A-Z]{2})/i);
  if(iso) return iso[1].toUpperCase();

  const states = {
    'acre':'AC','alagoas':'AL','amapa':'AP','amazonas':'AM','bahia':'BA','ceara':'CE',
    'distrito federal':'DF','espirito santo':'ES','goias':'GO','maranhao':'MA',
    'mato grosso':'MT','mato grosso do sul':'MS','minas gerais':'MG','para':'PA',
    'paraiba':'PB','parana':'PR','pernambuco':'PE','piaui':'PI','rio de janeiro':'RJ',
    'rio grande do norte':'RN','rio grande do sul':'RS','rondonia':'RO','roraima':'RR',
    'santa catarina':'SC','sao paulo':'SP','sergipe':'SE','tocantins':'TO'
  };

  return states[normalizeText(text)] || text;

}

function formatCityRegion(address){

  address = address || {};

  const city =
  address.city ||
  address.town ||
  address.village ||
  address.municipality ||
  address.county ||
  'Região Atual';

  const uf = stateToUF(
    address['ISO3166-2-lvl4'] ||
    address.state_code ||
    address.state
  );

  return uf && uf !== city ? `${city}-${uf}` : city;

}

async function updatePlaceFromCoordinates(){

  document.getElementById('coords').innerHTML =
  `${LAT.toFixed(5)} , ${LON.toFixed(5)}`;

  try{

    const geo =
    await fetch(
    `https://geocode.maps.co/reverse?lat=${LAT}&lon=${LON}`
    );

    const geoData = await geo.json();

    CITY = formatCityRegion(geoData.address);

  }catch(e){

    CITY = 'Região Atual';

  }

  document.getElementById('location-name').innerHTML = CITY;
  document.getElementById('city-input').value =
  CITY !== 'Região Atual' ? CITY : '';

}

async function getLocation(){

  return new Promise((resolve,reject)=>{

    navigator.geolocation.getCurrentPosition(

      async(pos)=>{

        LAT = pos.coords.latitude;
        LON = pos.coords.longitude;

        await updatePlaceFromCoordinates();

        resolve();

      },

      (err)=>{

        reject(err);

      },

      {
        enableHighAccuracy:true,
        timeout:10000,
        maximumAge:0
      }

    );

  });

}

async function searchCity(){

  const input = document.getElementById('city-input');
  const query = input.value.trim();

  if(!query){

    input.focus();
    return;

  }

  document.getElementById('location-name').innerHTML = 'Buscando cidade...';
  document.getElementById('content').innerHTML = `
  <div class="loading">
  <i class="ti ti-loader"></i>
  <h2 style="margin-top:20px;">
  Buscando região e clima...
  </h2>
  </div>
  `;

  try{

    const url =
    `https://geocode.maps.co/search?q=${encodeURIComponent(query)}&country=BR&limit=1`;

    const response = await fetch(url);
    const places = await response.json();

    if(!places.length){

      throw new Error('Cidade não encontrada');

    }

    const place = places[0];

    LAT = Number(place.lat);
    LON = Number(place.lon);

    CITY = formatCityRegion(place.address);

    if(CITY === 'Região Atual'){

      CITY = query.toUpperCase();

    }

    document.getElementById('location-name').innerHTML = CITY;
    document.getElementById('coords').innerHTML =
    `${LAT.toFixed(5)} , ${LON.toFixed(5)}`;

    const data = await fetchWeather();

    render(data);

  }catch(e){

    document.getElementById('location-name').innerHTML = CITY;
    document.getElementById('content').innerHTML = `
    <div class="section">
      <h2>
      Erro ao buscar cidade
      </h2>
      <p style="margin-top:12px;color:#9fb5c8;">
      Confira o nome da cidade. Exemplo: Itapagipe-MG.
      </p>
    </div>
    `;

  }

}

async function fetchWeather(){

  const url =
  `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,weathercode&timezone=auto&forecast_days=7`;

  const r = await fetch(url);

  if(!r.ok){

    throw new Error('Erro ao buscar clima');

  }

  return await r.json();

}

function weatherCode(code){

  if(code===0) return ['☀️','Sol'];

  if(code<=3) return ['⛅','Nublado'];

  if(code<=55) return ['🌫️','Neblina'];

  if(code<=65) return ['🌧️','Chuva'];

  if(code<=82) return ['⛈️','Tempestade'];

  return ['🌥️','Variável'];

}

function moonPhase(date){

  const known = new Date(2000,0,6,18,14);

  const days = (date - known)/(1000*60*60*24);

  const cycle = 29.53058867;

  let phase = ((days % cycle)+cycle)%cycle;

  if(phase<1.85)
  return ['🌑','Lua Nova','Excelente para pesca'];

  if(phase<7.38)
  return ['🌒','Crescente','Muito boa'];

  if(phase<9.22)
  return ['🌓','Quarto Crescente','Boa'];

  if(phase<14.77)
  return ['🌔','Gibosa Crescente','Regular'];

  if(phase<16.61)
  return ['🌕','Lua Cheia','Ruim'];

  if(phase<22.15)
  return ['🌖','Gibosa Minguante','Regular'];

  if(phase<24)
  return ['🌗','Quarto Minguante','Boa'];

  return ['🌘','Minguante','Excelente'];

}

function calcScore(code,rain,wind,moon){

  let score = 100;

  if(moon[1]==='Lua Nova') score += 25;
  if(moon[1]==='Lua Cheia') score -= 30;

  if(code===0) score += 15;

  if(code>=60) score -= 20;

  if(rain>10) score -= 15;

  if(wind>25) score -= 20;

  if(score>=110) return ['EXCELENTE','good',score];

  if(score>=80) return ['BOM','medium',score];

  if(score>=55) return ['REGULAR','medium',score];

  return ['RUIM','bad',score];

}

function render(data){

  weatherData = data;

  const daily = data.daily;

  const days = [];

  for(let i=0;i<7;i++){

    const date = new Date();

    date.setDate(date.getDate()+i);

    const moon = moonPhase(date);

    const score =
    calcScore(
      daily.weathercode[i],
      daily.precipitation_sum[i],
      daily.windspeed_10m_max[i],
      moon
    );

    days.push({

      date,
      moon,
      score,
      icon:weatherCode(daily.weathercode[i])[0],
      desc:weatherCode(daily.weathercode[i])[1],
      temp:Math.round(daily.temperature_2m_max[i]),
      min:Math.round(daily.temperature_2m_min[i]),
      rain:Math.round(daily.precipitation_sum[i]),
      wind:Math.round(daily.windspeed_10m_max[i])

    });

  }

  window.days = days;

  const selected = days[selectedDay];

  let daysHTML = '';

  const week =
  ['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];

  days.forEach((d,i)=>{

    daysHTML += `
    <div class="day-card ${i===selectedDay?'selected':''}"
    onclick="selectDay(${i})">

      <div class="day-name">
      ${i===0?'Hoje':week[d.date.getDay()]}
      </div>

      <div class="day-icon">
      ${d.icon}
      </div>

      <div class="day-temp">
      ${d.temp}°
      </div>

      <div style="color:#9fb5c8;font-size:13px;">
      ${d.min}° min
      </div>

      <div style="margin-top:8px;">
      ${d.moon[0]}
      </div>

    </div>
    `;

  });

  const width =
  Math.min(100,(selected.score[2]/140)*100);

  const fishHTML = PEIXES.map(f=>{

    let active =
    (selected.icon==='☀️' && f.sol)
    ||
    (selected.icon!=='☀️' && !f.sol);

    let label =
    active ? 'ATIVO' : 'MÉDIO';

    let cls =
    active ? 'good' : 'medium';

    if(selected.score[0]==='RUIM'){

      label = 'DIFÍCIL';
      cls = 'bad';

    }

    return `
    <div class="fish-card">

      <div class="fish-emoji">
      ${f.emoji}
      </div>

      <div class="fish-name">
      ${f.nome}
      </div>

      <div class="fish-desc">
      ${f.desc}
      </div>

      <div class="active ${cls}">
      ${label}
      </div>

    </div>
    `;

  }).join('');

  document.getElementById('content').innerHTML = `

  <div class="main-grid">

  <div class="section">

    <div class="section-title">
      <i class="ti ti-calendar-week"></i>
      PREVISÃO DOS PRÓXIMOS 7 DIAS
    </div>

    <div class="days-grid">
      ${daysHTML}
    </div>

  </div>

  <div class="section">

    <div class="section-title">
      <i class="ti ti-chart-bar"></i>
      CONDIÇÕES ATUAIS
    </div>

    <div class="cards-grid">

      <div class="card">

        <div class="card-label">
        Temperatura
        </div>

        <div class="card-value">
        ${selected.temp}°
        </div>

        <div class="card-sub">
        mínima ${selected.min}°
        </div>

      </div>

      <div class="card">

        <div class="card-label">
        Chuva
        </div>

        <div class="card-value">
        ${selected.rain}mm
        </div>

        <div class="card-sub">
        ${selected.desc}
        </div>

      </div>

      <div class="card">

        <div class="card-label">
        Vento
        </div>

        <div class="card-value">
        ${selected.wind}
        </div>

        <div class="card-sub">
        km/h
        </div>

      </div>

      <div class="card">

        <div class="card-label">
        Lua
        </div>

        <div class="card-value">
        ${selected.moon[0]}
        </div>

        <div class="card-sub">
        ${selected.moon[1]}
        </div>

      </div>

    </div>

    <div class="score-bar">

      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="font-size:18px;font-weight:700;">
        Índice de Pesca
        </div>

        <div class="active ${selected.score[1]}">
        ${selected.score[0]}
        </div>
      </div>

      <div class="track">
        <div class="fill"
        style="
        width:${width}%;
        background:
        ${selected.score[1]==='good'
        ?'#19c37d'
        :selected.score[1]==='medium'
        ?'#f7b731'
        :'#ff5d5d'};
        ">
        </div>
      </div>

    </div>

    <div class="moon">

      <div class="moon-emoji">
      ${selected.moon[0]}
      </div>

      <div>

        <div class="moon-title">
        ${selected.moon[1]}
        </div>

        <div class="moon-desc">
        ${selected.moon[2]}
        </div>

      </div>

    </div>

  </div>

  <div class="section">

    <div class="section-title">
      <i class="ti ti-fish"></i>
      PEIXES INVASORES / PERMITIDOS
    </div>

    <div class="fish-grid">
      ${fishHTML}
    </div>

  </div>

  <div class="section">

    <div class="section-title">
      <i class="ti ti-bulb"></i>
      DICAS INTELIGENTES
    </div>

    <ul class="tips">

      <li>
        <i class="ti ti-clock"></i>
        Melhor horário: 6h às 9h e 16h às 18h.
      </li>

      <li>
        <i class="ti ti-wave-square"></i>
        Priorize espécies não nativas da bacia do Paraná e confira regras locais antes da pesca.
      </li>

      <li>
        <i class="ti ti-wind"></i>
        Vento atual: ${selected.wind}km/h.
      </li>

      <li>
        <i class="ti ti-droplet"></i>
        Chuva prevista: ${selected.rain}mm.
      </li>

      <li>
        <i class="ti ti-map-pin"></i>
        Região atual: ${CITY}.
      </li>

    </ul>

  </div>

  </div>
  `;

}

function selectDay(i){

  selectedDay = i;

  render(weatherData);

}

async function loadAll(){

  try{

    await getLocation();

    const data = await fetchWeather();

    render(data);

  }catch(e){

    document.getElementById('content').innerHTML = `
    <div class="section">

      <h2>
      Erro ao obter GPS ou clima
      </h2>

      <p style="margin-top:12px;color:#9fb5c8;">
      Permita localização no navegador ou digite a cidade, por exemplo Itapagipe-MG.
      </p>

      <button class="btn"
      onclick="loadAll()"
      style="margin-top:20px;">
      Tentar novamente
      </button>

    </div>
    `;

  }

}

loadAll();

setInterval(loadAll,600000);

</script>

</body>
</html>
